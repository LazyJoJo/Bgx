# Test profile configuration
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stock_fund_db
    username: postgres
    password: 168168
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    root: warn
    com.stock.fund: warn

# 调度器配置
data:
  collection:
    schedule:
      alert-check-cron: "0 0 0 31 2 ?"
      stock-basic-cron: "0 0 0 31 2 ?"
      fund-basic-cron: "0 0 0 31 2 ?"
      stock-quote-cron: "0 0 0 31 2 ?"
      fund-quote-cron: "0 0 0 31 2 ?"
      daily-collection-cron: "0 0 0 31 2 ?"
      risk-alert-1130-cron: "0 0 0 31 2 ?"
      risk-alert-1430-cron: "0 0 0 31 2 ?"
