# Test configuration - use real PostgreSQL database
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stock_fund_db
    username: postgres
    password: 168168
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never  # Don't run schema.sql, use existing database

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    root: info
    com.stock.fund: warn
