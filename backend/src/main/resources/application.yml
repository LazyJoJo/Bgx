spring:
  application:
    name: stock-fund-data-collector

  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/stock_fund_db
    username: postgres
    password: ${DB_PASSWORD:168168}
    driver-class-name: org.postgresql.Driver

  # Caffeine 本地缓存配置
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=3600s
  
  # MyBatis-Plus配置
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    mapper-locations: classpath*:/mapper/**/*.xml
    global-config:
      db-config:
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0
  
  # 主配置
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

# 服务器配置
server:
  port: 9090
  # 注释掉 context-path，让 Controller 自己管理路径前缀
  # servlet:
  #   context-path: /api

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  default-flat-param-object: true

# 数据采集配置
data:
  collection:
    api:
      tushare-token: ${TUSHARE_TOKEN:your_tushare_token}
      sina-enabled: true
      eastmoney-enabled: true
      stocktv-enabled: false
    schedule:
      stock-basic-cron: "0 0 2 * * ?"
      fund-basic-cron: "0 0 3 * * ?"
      stock-quote-cron: "0 */1 9-15 * * MON-FRI"
      fund-quote-cron: "0 */15 9-15 * * MON-FRI"
      daily-collection-cron: "0 0 16 * * MON-FRI"
      alert-check-cron: "0 */1 * * * ?"
    retry:
      max-attempts: 3
      delay-ms: 1000
      max-delay-ms: 10000
      multiplier: 1.5
    validation:
      enabled: true
      strict-mode: false
      max-pe-ratio: 100.0
      max-pb-ratio: 10.0
      max-price-change-percent: 20.0

# Caffeine 缓存配置
cache:
  default-ttl: 3600
  max-size: 10000

# 日志配置
logging:
  level:
    root: info
    com.stock.fund: debug
    org.springframework.web: debug
    org.apache.ibatis: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30